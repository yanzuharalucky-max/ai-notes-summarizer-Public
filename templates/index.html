<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 AI Notes Summarizer</title>

    <style>
        /* === GLOBAL RESET === */
        * {
            box-sizing: border-box;
            transition: .25s ease;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at 20% 10%, #231b54, #0c0825, #16112f);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* === BACKGROUND PARTICLES === */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.7);
            filter: blur(2px);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            from {
                transform: translateY(120vh) scale(0.7);
                opacity: 0;
            }

            to {
                transform: translateY(-20vh) scale(1.2);
                opacity: 0.9;
            }
        }

        /* === FLOATING ORB === */
        .nav-orb {
            position: fixed;
            top: -180px;
            left: 50%;
            transform: translateX(-50%);
            width: 580px;
            height: 580px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.22), transparent 70%);
            filter: blur(120px);
            opacity: .85;
            animation: orbFloat 9s ease-in-out infinite alternate;
            z-index: 1;
        }

        @keyframes orbFloat {
            from {
                transform: translateX(-50%) translateY(0);
            }

            to {
                transform: translateX(-50%) translateY(45px);
            }
        }

        /* === NAVBAR CYBERPUNK === */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 14px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            border-bottom: 1.5px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.25),
                0 0 65px rgba(150, 50, 255, 0.18);
            animation: fadeDown .7s ease-out;
            z-index: 99;
        }

        nav::after {
            content: "";
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00ffff, #8a2be2, #00ffff);
            filter: blur(10px);
            opacity: .85;
            animation: neonMove 4s linear infinite;
        }

        @keyframes neonMove {
            0% {
                opacity: .5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: .5;
            }
        }

        nav h1 {
            font-size: 1.6em;
            background: linear-gradient(90deg, #00ffff, #b788ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseLogo 6s ease-in-out infinite;
        }

        @keyframes pulseLogo {
            0% {
                text-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
            }

            50% {
                text-shadow: 0 0 24px rgba(150, 50, 255, 0.55);
            }

            100% {
                text-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
            }
        }

        .links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .links a {
            color: #00eaff;
            padding: 7px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            opacity: .85;
            border: 1px solid transparent;
        }

        .links a:hover {
            opacity: 1;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 16px rgba(0, 255, 255, 0.7),
                0 0 32px rgba(150, 50, 255, 0.35);
            transform: translateY(-2px) scale(1.05);
        }

        .profile-container {
            position: relative;
        }

        .btn-user {
            background: linear-gradient(90deg, #00ffff, #8a2be2);
            padding: 8px 20px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.35),
                0 0 40px rgba(150, 50, 255, 0.25);
            font-weight: 600;
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
        }

        .dropdown {
            position: absolute;
            right: 0;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 16px;
            width: 240px;
            border-radius: 14px;
            display: none;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 26px rgba(0, 255, 255, 0.25),
                0 0 55px rgba(150, 50, 255, 0.25);
            animation: smoothPop .25s ease;
        }

        .dropdown.active {
            display: block;
        }

        @keyframes fadeDown {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes smoothPop {
            0% {
                opacity: 0;
                transform: scale(.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* === MAIN CARD === */
        .container {
            margin-top: 160px;
            display: flex;
            justify-content: center;
            z-index: 20;
            position: relative;
        }

        .card {
            width: 520px;
            padding: 50px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.35);
            text-align: center;
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.25),
                0 0 75px rgba(150, 50, 255, 0.25),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            animation: fadeUp 1s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg,
                    transparent,
                    #00ffff,
                    #b044ff,
                    transparent);
            animation: cardLine 3s linear infinite;
            z-index: 3;
        }

        @keyframes cardLine {
            from {
                left: -100%;
            }

            to {
                left: 100%;
            }
        }

        .card::after {
            content: "";
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 36px;
            background: conic-gradient(from 0deg,
                    #00ffff,
                    #8a2be2,
                    #b44fff,
                    #00ffff);
            filter: blur(10px);
            opacity: 0.95;
            z-index: 0;
            pointer-events: none;
            transform-origin: center;
            animation: rotateRing 6s linear infinite;
            mix-blend-mode: screen;
        }

        .inner-mask {
            position: absolute;
            inset: 6px;
            border-radius: 22px;
            background: rgba(11, 8, 30, 0.45);
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: normal;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        @keyframes rotateRing {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(35px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            font-size: 2em;
            background: linear-gradient(90deg, #00ffff, #b077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 255, 255, 0.35);
            position: relative;
            z-index: 4;
        }

        /* === INPUT === */
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.28);
            border: 1.5px solid rgba(255, 255, 255, 0.22);
            color: white;
            margin-bottom: 14px;
            backdrop-filter: blur(6px);
            box-shadow: inset 0 0 18px rgba(0, 255, 255, 0.25);
            position: relative;
            z-index: 4;
        }

        textarea:focus,
        input[type="file"]:focus {
            border-color: #00ffff;
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.6),
                inset 0 0 18px rgba(0, 255, 255, 0.35);
        }

        input[type="submit"] {
            margin-top: 25px;
            background: linear-gradient(90deg, #00ffff, #8a2be2);
            padding: 12px 38px;
            border-radius: 18px;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.55),
                0 0 45px rgba(150, 50, 255, 0.35);
            position: relative;
            z-index: 4;
        }

        input[type="submit"]:hover {
            transform: scale(1.07) translateY(-2px);
            box-shadow: 0 0 26px rgba(0, 255, 255, 0.8),
                0 0 70px rgba(150, 50, 255, 0.55);
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: #bbb;
            padding-bottom: 25px;
            position: relative;
            z-index: 4;
        }

        footer span {
            color: #00ffff;
        }

        /* === SPEECH TO TEXT BUTTON === */
        .btn-voice {
            margin-top: 14px;
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(90deg, #00ffff, #8a2be2);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.55),
                0 0 45px rgba(150, 50, 255, 0.35);
            color: white;
            transition: .3s;
            font-weight: bold;
            position: relative;
            z-index: 4;
        }

        .btn-voice:hover {
            transform: scale(1.05);
            box-shadow: 0 0 26px rgba(0, 255, 255, 0.8),
                0 0 70px rgba(150, 50, 255, 0.55);
        }

        .btn-voice.recording {
            background: #ff1f1f !important;
            box-shadow: 0 0 20px #ff3a3a, 0 0 45px #ff0000;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 10px #ff1f1f;
            }

            50% {
                box-shadow: 0 0 20px #ff5f5f;
            }

            100% {
                box-shadow: 0 0 10px #ff1f1f;
            }
        }

        /* === LOADING OVERLAY === */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 10, 20, 0.75);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999999;
        }

        .hex-spinner {
            width: 90px;
            height: 90px;
            position: relative;
            animation: spinHex 1.6s linear infinite;
            filter: drop-shadow(0 0 25px cyan);
        }

        .hex-spinner::before,
        .hex-spinner::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 14px;
            border: 5px solid #00ffff;
            transform: rotate(60deg);
        }

        @keyframes spinHex {
            0% {
                transform: rotate(0deg) scale(1);
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .neon-run {
            width: 280px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00ffff, #ac34ff, transparent);
            margin-top: 25px;
            animation: runLine 2s linear infinite;
            filter: blur(4px);
        }

        @keyframes runLine {
            0% {
                transform: translateX(-280px);
            }

            100% {
                transform: translateX(280px);
            }
        }

        .load-text {
            margin-top: 22px;
            font-size: 1.3em;
            color: #00ffff;
            letter-spacing: 2px;
            animation: typing 2.5s steps(25) infinite alternate;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #0ff;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 230px;
            }
        }
    </style>
</head>

<body>

    <!-- === LOADING OVERLAY === -->
    <div id="loadingOverlay">
        <div class="hex-spinner"></div>
        <div class="neon-run"></div>
        <div class="load-text">Sedang merangkum...</div>
        <audio id="loadingSound" src="https://files.catbox.moe/x6ud9y.mp3"></audio>
    </div>

    <div class="particles"></div>

    <script>
        for (let i = 0; i < 35; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (4 + Math.random() * 6) + "s";
            p.style.opacity = Math.random();
            document.querySelector(".particles").appendChild(p);
        }
    </script>

    <div class="nav-orb"></div>

    <!-- NAVBAR -->
    <nav>
        <h1>💬 AI Notes Summarizer</h1>

        <div class="links">
      <a href="{{ url_for('index') }}">🏠 Beranda</a>
      <a href="{{ url_for('history') }}">📜 Riwayat</a>
      <a href="{{ url_for('about') }}">🤖 About AI</a>


            <div class="profile-container">
                <div class="btn-user" onclick="toggleDropdown()">
                    👤 {{ user.name }}
                </div>

                <div id="profileDropdown" class="dropdown">
                    <p><b>Nama:</b> {{ user.name }}</p>
                    <p><b>Email:</b> {{ user.email }}</p>

                    <hr style="border:1px solid rgba(255,255,255,0.1); margin:10px 0;">

                    <a href="{{ url_for('logout') }}" style="color:#ff7777;text-decoration:none;">
                        🚪 Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- CARD -->
    <div class="container">
        <div class="card">
            <div class="inner-mask" aria-hidden="true"></div>

            <h2>Unggah atau Tulis Catatanmu</h2>

            <form id="sumForm" action="{{ url_for('summarize') }}" method="post" enctype="multipart/form-data">
                <input type="file" name="file" accept=".txt,.pdf,.docx,.png,.jpg,.jpeg">
                <textarea name="text_input" placeholder="Atau tulis teks di sini..." rows="5"></textarea>

                <button id="voiceBtn" type="button" class="btn-voice">🎤 Rekam Suara</button>

                <input type="submit" value="🧠 Unggah & Ringkas">
            </form>
        </div>
    </div>

    <footer>
        © 2025 <span>Lucky Yan Zuhara</span>
    </footer>

    <script>
        function toggleDropdown() {
            document.getElementById("profileDropdown").classList.toggle("active");
        }

        window.addEventListener("click", (e) => {
            if (!e.target.matches(".btn-user")) {
                document.getElementById("profileDropdown").classList.remove("active");
            }
        });

        /* === SHOW LOADER === */
        document.getElementById("sumForm").addEventListener("submit", () => {
            document.getElementById("loadingOverlay").style.display = "flex";

            const audio = document.getElementById("loadingSound");
            audio.volume = 0.5;
            audio.play().catch(() => { });
        });

        /* === SPEECH TO TEXT === */
        const voiceBtn = document.getElementById("voiceBtn");
        const textArea = document.querySelector("textarea");

        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!window.SpeechRecognition) {
            alert("Browser kamu tidak mendukung Speech Recognition. Coba pakai Google Chrome.");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = "id-ID";
            recognition.interimResults = true;
            recognition.continuous = true;

            let isRecording = false;
            let finalTranscript = "";

            voiceBtn.addEventListener("click", () => {
                if (!isRecording) {
                    finalTranscript = "";
                    textArea.value = "";
                    recognition.start();
                    isRecording = true;
                    voiceBtn.classList.add("recording");
                    voiceBtn.innerText = "🛑 Stop Rekaman";
                } else {
                    isRecording = false;
                    recognition.stop();
                    voiceBtn.classList.remove("recording");
                    voiceBtn.innerText = "🎤 Rekam Suara";
                }
            });

            recognition.addEventListener("result", (event) => {
                let interim = "";

                for (let i = 0; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;

                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + " ";
                    } else {
                        interim += transcript;
                    }
                }

                textArea.value = finalTranscript + interim;
            });

            recognition.addEventListener("end", () => {
                if (isRecording) recognition.start();
            });
        }
    </script>
</body>

</html>
